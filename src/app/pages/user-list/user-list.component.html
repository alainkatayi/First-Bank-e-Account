

<div class="flex h-screen overflow-hidden bg-gray-100 font-sans">

    <!-- SIDEBAR : Fixe et immobile -->
    <aside class="w-64 shrink-0 h-screen bg-[#001529] z-50">
        <app-sidebar></app-sidebar>
    </aside>

    <!-- MAIN CONTENT AREA : Seul ce bloc défile -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">

        <!-- Dashboard Content : La zone qui scroll -->
        <div class="flex-1 overflow-y-auto p-8">
<div class="flex items-center justify-between mb-8">
    <!-- Titre à gauche -->
    <h1 class="font-bold text-[#001529] text-2xl">Liste des utilisateurs</h1>

    <!-- Bouton à droite -->
    <a href="#" class="bg-[#001529] text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-sm hover:bg-yellow-600 hover:text-[#001529] transition-all flex items-center space-x-2">
        <!-- Petit plus pour le style -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        <span>Ajouter un utilisateur</span>
    </a>
</div>
            <!-- Main Data Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-[11px] uppercase tracking-widest font-bold border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 font-bold">Username </th>
                                <th class="px-6 py-4 font-bold">Email </th>
                                <th class="px-6 py-4 font-bold">Role</th>
                                <th class="px-6 py-4 font-bold">Action</th>
                            </tr>
                        </thead>
                        <tbody  *ngFor="let user of users" class="text-sm divide-y divide-gray-100">
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 font-semibold text-gray-800"> {{user.username}} </td>
                                <td class="px-6 py-4 text-gray-600"> {{user.email}} </td>
                                <td class="px-6 py-4">
                                    <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold italic" [ngClass]="{
                  'bg-yellow-100 text-yellow-700': user.role === 'agent',
                  'bg-green-100 text-green-700': user.role === 'admin',
                }"> {{user.role}} </span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                <button 
        title="Voir les détails"
        class="text-[#001529] hover:text-yellow-600 transition-colors p-2 hover:bg-gray-100 rounded-full inline-flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
    </button>
                                </td>
                            </tr>
                            <!-- Répétition pour Sifa Mapenzi ... -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>
