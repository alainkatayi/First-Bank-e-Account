<div class="flex h-screen overflow-hidden bg-gray-100 font-sans">

    <!-- SIDEBAR : Fixe et immobile -->
    <aside class="w-64 shrink-0 h-screen bg-[#001529] z-50">
        <app-sidebar></app-sidebar>
    </aside>

    <!-- MAIN CONTENT AREA : Seul ce bloc défile -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">

        <!-- Dashboard Content : La zone qui scroll -->
        <div class="flex-1 overflow-y-auto p-8">
            <div class="flex items-center justify-between mb-8">
                <!-- Titre à gauche -->
                <h1 class="font-bold text-[#001529] text-2xl">Liste des utilisateurs</h1>

                <!-- Bouton à droite -->
                <button (click)="toggleModal()"
                    class="bg-[#001529] text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-sm hover:bg-yellow-600 hover:text-[#001529] transition-all flex items-center space-x-2">
                    <!-- Petit plus pour le style -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    <span>Ajouter un utilisateur</span>
                </button>
            </div>
            <!-- Main Data Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead
                            class="bg-gray-50 text-gray-400 text-[11px] uppercase tracking-widest font-bold border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 font-bold">Username </th>
                                <th class="px-6 py-4 font-bold">Email </th>
                                <th class="px-6 py-4 font-bold">Role</th>
                                <th class="px-6 py-4 font-bold">Action</th>
                            </tr>
                        </thead>
                        <tbody *ngFor="let user of users" class="text-sm divide-y divide-gray-100">
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 font-semibold text-gray-800"> {{user.username}} </td>
                                <td class="px-6 py-4 text-gray-600"> {{user.email}} </td>
                                <td class="px-6 py-4">
                                    <span
                                        class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold italic"
                                        [ngClass]="{
                  'bg-yellow-100 text-yellow-700': user.role === 'agent',
                  'bg-green-100 text-green-700': user.role === 'admin',
                }"> {{user.role}} </span>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button title="Voir les détails"
                                        class="text-[#001529] hover:text-yellow-600 transition-colors p-2 hover:bg-gray-100 rounded-full inline-flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </button>
                                </td>
                            </tr>
                            <!-- Répétition pour Sifa Mapenzi ... -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- Overlay de la Modale (Flou d'arrière-plan) -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">

    <!-- Contenu de la Modale -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
        <div *ngIf="show_toast" class="fixed top-24 right-6 z-100 animate-slide-in-right">

            <div class="flex items-center gap-4 bg-white border-l-4 p-4 rounded-xl shadow-2xl min-w-75 max-w-sm border-slate-100"
                [ngClass]="{
           'border-l-teal-600': toastType === 'success',
           'border-l-red-500': toastType === 'error'
         }">

                <div class="shrink-0">
                    <div [ngClass]="toastType === 'success' ? 'bg-teal-50' : 'bg-red-50'" class="p-2 rounded-full">
                        <svg *ngIf="toastType === 'success'" class="w-5 h-5 text-teal-600" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                        </svg>
                        <svg *ngIf="toastType === 'error'" class="w-5 h-5 text-red-500" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </div>
                </div>

                <div class="flex-1">
                    <p class="text-sm font-bold text-slate-800">
                        {{ toastType === 'success' ? 'Confirmation' : 'Attention' }}
                    </p>
                    <p class="text-xs text-slate-500 font-medium leading-tight">
                        {{ toastMessage }}
                    </p>
                </div>

                <button (click)="show_toast = false" class="text-slate-300 hover:text-slate-500 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </div>
        <!-- Header de la Modale -->
        <div class="bg-[#001529] p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">Nouvel Utilisateur</h3>
            <button (click)="showModal = false" class="text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Formulaire -->
        <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-8 space-y-5">
            <!-- Username -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Nom d'utilisateur</label>
                <input formControlName="username" type="text" placeholder="ex: j.doe"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-yellow-600 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Email Professionnel</label>
                <input formControlName="email" type="email" placeholder="nom@firstbank.cd"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-yellow-600 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Mot de passe</label>
                <input formControlName="password" type="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-yellow-600 focus:border-transparent outline-none transition-all">
            </div>

            <!-- Actions -->
            <div class="flex space-x-3 pt-4">
                <button type="button" (click)="showModal = false"
                    class="flex-1 px-4 py-3 border border-gray-300 text-gray-600 font-bold rounded-lg hover:bg-gray-50 transition-all">
                    Annuler
                </button>
                <button [disabled]="is_creating"  type="submit"
                    class="flex-1 px-4 py-3 bg-yellow-600 text-[#001529] font-bold rounded-lg hover:bg-yellow-700 shadow-lg shadow-yellow-600/20 transition-all">
                    
                    <span *ngIf="!is_creating">Créer l'agent</span>

                    <span class="text-center">
                        <div role="status" *ngIf="is_creating">
                            <svg aria-hidden="true"
                                class="w-8 h-8 text-gray-200 animate-spin dark:text-white fill-white ml-2 inline-block"
                                viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                                    fill="currentColor" />
                                <path
                                    d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                                    fill="currentFill" />
                            </svg>
                        </div>

                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
