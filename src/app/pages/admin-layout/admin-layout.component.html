

<div class="flex h-screen overflow-hidden bg-gray-100 font-sans">

    <!-- SIDEBAR : Fixe et immobile -->
    <aside class="w-64 shrink-0 h-screen bg-[#001529] z-50">
        <app-sidebar></app-sidebar>
    </aside>

    <!-- MAIN CONTENT AREA : Seul ce bloc défile -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">

        <!-- Dashboard Content : La zone qui scroll -->
        <div class="flex-1 overflow-y-auto p-8">
            <h1  class="font-bold text-[#001529] text-2xl mb-5">Liste de demandes</h1>
            <!-- Main Data Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-[11px] uppercase tracking-widest font-bold border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 font-bold">Nom </th>
                                <th class="px-6 py-4 font-bold">prenom </th>
                                <th class="px-6 py-4 font-bold">Status</th>
                                <th class="px-6 py-4 font-bold">Date & Heure</th>
                                <th class="px-6 py-4 text-right font-bold">Action</th>
                            </tr>
                        </thead>
                        <tbody  *ngFor="let request of requests" class="text-sm divide-y divide-gray-100">
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 font-semibold text-gray-800"> {{request.name}} </td>
                                <td class="px-6 py-4 text-gray-600"> {{request.first_name}} </td>
                                <td class="px-6 py-4">
                                    <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold italic" [ngClass]="{
                  'bg-yellow-100 text-yellow-700': request.status === 'PENDING',
                  'bg-green-100 text-green-700': request.status === 'approved',
                  'bg-red-100 text-red-700': request.status === 'rejected'
                }"> {{statusTranslation[request.status] || request.status}} </span>
                                </td>
                                <td class="px-6 py-4 text-gray-500 text-xs"> {{request.created_at | date:'dd/MM/yyyy HH:mm'}} </td>
                                <td class="px-6 py-4 text-right">
                                <button 
        title="Voir les détails"
        class="text-[#001529] hover:text-yellow-600 transition-colors p-2 hover:bg-gray-100 rounded-full inline-flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
    </button>
                                </td>
                            </tr>
                            <!-- Répétition pour Sifa Mapenzi ... -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>
