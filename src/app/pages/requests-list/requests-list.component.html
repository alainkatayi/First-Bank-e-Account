<div class="min-h-screen bg-gray-50 font-sans">

    <!-- Main Content -->
     <app-navbar></app-navbar>
    <main class="max-w-4xl mx-auto py-12 px-4">

        <!-- Filter Section -->
        <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <h1 class="text-xl font-bold text-[#001529]">Demandes d'ouverture de compte</h1>
            <div class="flex space-x-2">
                <select
                    class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-yellow-600 focus:border-yellow-600 p-2 outline-none">
                    <option value="">Tous les statuts</option>
                    <option value="pending">En attente</option>
                    <option value="approved">Approuvé</option>
                    <option value="rejected">Rejeté</option>
                </select>
            </div>
        </div>

        <!-- Requests List -->
        <div class="space-y-4">
            <!-- Card Item Loop -->
            <div *ngFor="let request of requests"
                class="group bg-white p-6 rounded-2xl shadow-sm border-l-4 border-l-gray-200 hover:border-l-yellow-600 hover:shadow-md transition-all flex items-center justify-between">

                <div class="flex items-center space-x-4">
                    <div [ngClass]="{
            'bg-yellow-100 text-yellow-700': request.status === 'PENDING',
            'bg-green-100 text-green-700': request.status === 'approved',
            'bg-red-100 text-red-700': request.status === 'rejected'
          }" class="p-3 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-gray-900 group-hover:text-[#001529] transition-colors">
                            {{request.name}} {{ request.last_name }} {{ request.first_name }}
                        </h3>
                        <div class="flex items-center space-x-3 text-sm text-gray-500">
                            <span class="flex items-center">
                                <span class="flex items-center">
                                    <!-- Nouvelle Icône Calendrier -->
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    {{ request.created_at | date:'dd/MM/yyyy' }}
                                </span>
                            </span>
                            <span>•</span>
                            <span class="font-medium uppercase px-2 py-0.5 rounded text-[10px]" [ngClass]="{
                  'bg-yellow-100 text-yellow-700': request.status === 'PENDING',
                  'bg-green-100 text-green-700': request.status === 'approved',
                  'bg-red-100 text-red-700': request.status === 'rejected'
                }">
                                {{ request.status }}
                            </span>
                        </div>
                    </div>
                </div>

                <button
                    class="bg-gray-50 text-[#001529] hover:bg-[#001529] hover:text-white font-semibold py-2 px-6 rounded-xl border border-gray-200 transition-all text-sm shadow-sm">
                    Traiter le dossier
                </button>

            </div>
        </div>

    </main>
</div>
